version: '3.8'

services:
  notion-opus:
    build: .
    container_name: notion_opus
    restart: unless-stopped
    ports:
      - "8000:8000"
    # 将包含 .env 的宿主机文件映射给容器
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/conversations.db
    # 持久化聊天记录数据库
    volumes:
      - ./data:/app/data

